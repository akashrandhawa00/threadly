<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="thread" gradientUnits="userSpaceOnUse" x1="144" y1="150" x2="368" y2="410">
      <stop offset="0%" stop-color="#fabd2f"/>
      <stop offset="100%" stop-color="#fe8019"/>
    </linearGradient>
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#32302f"/>
      <stop offset="100%" stop-color="#1d2021"/>
    </linearGradient>
  </defs>

  <!-- background squircle -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- subtle inner border -->
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#504945" stroke-width="2"/>

  <!-- thread crossbar of the T -->
  <path d="M 144 188 L 368 188" fill="none" stroke="url(#thread)" stroke-width="42" stroke-linecap="round"/>

  <!-- thread stem of the T, a gentle stitched curve down to a knot -->
  <path d="M 256 188 C 246 240, 268 280, 256 330 C 250 352, 262 372, 256 390"
        fill="none" stroke="url(#thread)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- needle eye / thread knot at the tip -->
  <circle cx="256" cy="396" r="17" fill="#fabd2f"/>
  <circle cx="256" cy="396" r="7" fill="#1d2021"/>

  <!-- small accent dot, loose thread tail -->
  <circle cx="144" cy="188" r="7" fill="#fabd2f" opacity="0.9"/>
</svg>
